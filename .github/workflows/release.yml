name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'custom_components/new_burnswick/manifest.json'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: manifest_version
        run: |
          VERSION=$(jq -r .version custom_components/new_burnswick/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.manifest_version.outputs.version }}
          name: v${{ steps.manifest_version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
